l_english:
 elder_events.1000.t: "You Used to Know Me"
 elder_events.1000.desc: ""[confusion_target.GetFirstName], my darling [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))] — it is good to see you!" my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] looks me in the eyes, a flicker of uncertainty behind [elder.GetHerHis] smile. "You were always the [confusion_target.Custom('ComplimentAdjective')] one. That's why I love you most."\n\nIn [elder.GetHerHis] [GetTrait('withering_mind').GetName( GetNullCharacter )], I'm my [confusion_target.Custom('SisterBrother')] today...\n\nTomorrow, I might be a stranger."
 elder_events.1000.a: "Please, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] — I'm [ROOT.Char.GetFirstNameNoTooltip]!"
 elder_events.1000.b: "Wha... yes, it is good to see you too..."
 elder_events.1100.t: "The Stairway To..."
 elder_events.1100.desc: "So many times I've climbed these stairs. Why, then, does today feel like scaling the mountains of [mountain_reference.GetName]?\n\nMy legs tremble. My knees fail me. There's nothing to catch my fall.\n\nI tumble toward the bottom."
 elder_events.1100.a: "Aaargh!"
 elder_events.1100.bodyguard: "Help! Save me!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "This option is available because you have a [GetCourtPositionType('bodyguard_court_position').GetName()]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "This option is available because you have a [GetCourtPositionType('court_tutor_court_position').GetName()]"
 partially_mute_modifier: "Partially Mute"
 partially_mute_modifier_desc: "This character has a very hard time speaking due to age related ailments."
 elder_events.1200.t: "Numbness"
 elder_events.1200.desc: "It strikes without warning. The left side of my body goes numb. I try to smile, but my lips won't move.\n\nI try to speak. I cannot.\n\nEventually, my voice returns. But the fear of [ROOT.Char.GetFaith.NegativeAfterLife] remains."
 elder_events.1200.a: "..."
 elder_events.1300.t: "Lessons Unlearned"
 elder_events.1300.desc: "Have I read these scrolls on [ROOT.Char.Custom('education_scroll_subject')]? I... I can't recall. Perhaps I have?\n\nSurely they were part of my studies, part of my education...\n\nYes. My... education..."
 elder_events.1300.a: "It cannot have been that important..."
 elder_events.1300.tutor: "I need help to remember."
 elder_events.1400.t: "A Good Tumble"
 elder_events.1400.desc: ""Come to bed, my [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.Custom('RaunchyComplimentNoun')]," my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName] [lover.Custom('PurrGrowl')], [lover.GetHerHis] eyes smoldering with lust. "Aren't you the least bit curious what your [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')] has learned?"\n\nWith a wicked grin, [lover.GetSheHe] bites [lover.GetHerHis] lip and sinks onto the sheets.\n\n"Take me. Now.""
 elder_events.1400.a: "A thousand horses couldn't stop me!"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName] save me from this [lover.GetWomanMan]."
 death_best_sex_of_their_life: "suffered a heart attack while having the best sex of [CHARACTER.GetHerHis] life"
 purrs: "purrs"
 growls: "growls"
 raunchy_little: "little"
 raunchy_sweet: "sweet"
 raunchy_pretty: "pretty"
 raunchy_bold: "bold"
 raunchy_wild: "wild"
 raunchy_fiery: "fiery"
 raunchy_young: "young"
 raunchy_eager: "eager"
 elder_events.1500.t: "A Tumble to Die For"
 elder_events.1500.desc: ""They once called me '[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]'," my [lover.GetWifeHusband] [lover.GetFirstName] sighs, a faint smile on [lover.GetHerHis] lips. "Now I can barely climb the stairs without gasping for breath..."\n\nWith my youthful vigor, I could help [lover.GetHerHim] remember what it feels like to be wanted.\n\nBut... could [lover.GetHerHis] [GetTrait('faltering_heart').GetName( GetNullCharacter )] withstand it?"
 elder_events.1500.a: "I will give [lover.GetHerHim] the tumble of [lover.GetHerHis] life!"
 elder_events.1500.b: "Better not."
 elder_events.1600.t: "Can't Outrun Time"
 elder_events.1600.desc: "I run. I have to stop. Out of breath already.\nI used to run laps around the [ROOT.Char.Custom('ResidenceBuilding')]...\n\nI start again. I almost fall. I stop, again.\n\nCurse this frail body."
 elder_events.1600.a: "My running days are over."
 elder_events.1600.b: "I #EMP must#! push through the pain."
