 not_yet_chosen: "not yet chosen"
 story_cycle_pet_dog: "Pet Dog"
 story_cycle_pet_dog_desc: "#F A faithful canine companion walks at your side, offering protection and a bond of loyalty few humans can match.#!"
 DOG_INFORMATION_STRING: "Your dog's name is #V [Story.Custom('DogStoryNameAll')].#!\n[Story.Custom('DogStoryHerHisAll')|U] fur is [Story.Custom('DogFurColorAll')], [Story.Custom('DogStoryHerHisAll')] eyes are [Story.Custom('DogEyeColorAll')], and [Story.Custom('DogStorySheHeAll')] is [Story.Custom('DogStoryPuppyOrAgeAll')].\n[Story.Custom('DogStorySheHeAll')|U] is a very good [Story.Custom('DogStoryGirlBoyAll')]."
 dog_age_puppy: "a puppy"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0] years old"
 cat_age_kitten: "a kitten"
 cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0] years old"
 story_cycle_pet_cat: "Pet Cat"
 story_cycle_pet_cat_desc: "#F A proud feline keeps you company, a nimble hunter who offers affection only on its own terms.#!"
 CAT_INFORMATION_STRING: "Your cat's name is #V [Story.Custom('CatStoryNameAll')].#!\n[Story.Custom('CatStoryHerHisAll')|U] fur is [Story.Custom('CatFurColorAll')], [Story.Custom('CatStoryHerHisAll')] eyes are [Story.Custom('CatEyeColorAll')], and [Story.Custom('CatStorySheHeAll')] is [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\n[Story.Custom('CatStorySheHeAll')|U] is a dumb [Story.Custom('CatFurColorAll')] [Story.Custom('CatStoryGirlBoyAll')], but very sweet."
 story_cycle_pet_eagle: "Hunting Eagle"
 story_cycle_pet_eagle_desc: "#F By your glove perches a hunting eagle, ever watchful, ever hungry, bringing death from above.#!"
 EAGLE_INFORMATION_STRING: "Your eagles's name is #V [Story.Custom('EagleStoryNameAll')].#!\n[Story.Custom('EagleStorySheHeAll')|U] is [Story.MakeScope.Var('eagle_age_variable').GetValue|0] years old."
 bp2_hostage_loyalty: "A Loyal Hostage"
 bp2_hostage_loyalty_desc: "One of your [hostages|E] is starting to warm up to you and your ways."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Your [hostage|E], [Story.MakeScope.Var('hostage_target').Char.GetUIName], is growing up in your [court|E], affecting [Story.MakeScope.Var('hostage_target').Char.GetHerHis] allegiance. Keep [Story.MakeScope.Var('hostage_target').Char.GetHerHis] [opinion|E] high and choose the right options in events to make [Story.MakeScope.Var('hostage_target').Char.GetHerHim] more likely to be loyal to you when [Story.MakeScope.Var('hostage_target').Char.GetSheHe] becomes an adult.\n\nCurrent Loyalty: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Loyalty Points"
 claimant: "[claimant|E]"
 diverted_crusaders: "Diverted Crusaders"
 frankokratia_story: "Frankokratia"
 frankokratia_story_desc: "A claimant to [GetTitleByKey('e_byzantium').GetName|l] has lured western opportunists from their crusade, turning greedy swords toward the heart of Christendom itself..."
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "A [war|E] against [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] will determine the future of [GetTitleByKey('e_byzantium').GetName|l]. Either the [claimant|E] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] will seize the throne, paying the crusaders for their efforts — or a new [GetTitleByKey('e_latin_empire').GetBaseName] will be established under [GetFaithByKey('catholic').GetAdjective] rule."
 story_conqueror: "Conqueror"
 story_conqueror_desc: "Your ambition knows no bounds! The world lies before you, ripe for the taking."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Conquerors receive many powerful bonuses, such as a reduction in [factions|E], access to the [vassalize_casus_belli|E], and occational powerful events.\n\nYou will stop being a Conqueror if:\n$BULLET_WITH_TAB$You are not [independent|E]\n$BULLET_WITH_TAB$Your rank is reduced to [count|E]\n$BULLET_WITH_TAB$You become [unlanded|E]\n$BULLET_WITH_TAB$You're not at [war|E] for #V 10#! years\n$BULLET_WITH_TAB$You're deep in [debt|E]\n$BULLET_WITH_TAB$You lose #V 3#! or more [wars|E]\n$BULLET_WITH_TAB$You become [GetTrait('incapable').GetName( GetNullCharacter )]"
 story_destiny_child: "Destined Child"
 story_destiny_child_desc: "A child of great promise has been born, as if chosen by the fates themselves."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Once in a blue moon, a child destined for greatness is born. They develop faster than usual and reach heights that others won't.\n\nTake great care of [Story.MakeScope.Var('destiny_child').Char.GetUIName], and consider working toward making [Story.MakeScope.Var('destiny_child').Char.GetHerHim] your [player_heir|E] — for example, by making [Story.MakeScope.Var('destiny_child').Char.GetHerHim] your [designated_heir|E]."
 CHILD_OF_DESTINY: "The Destined Child"
 story_cycle_martial_lifestyle_warhorse: "Warhorse"
 story_cycle_martial_lifestyle_warhorse_desc: "You have a particularly well-trained warhorse at your disposal. May your enemies tremble before your charge."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Your warhorse is named #V [Story.Custom('WarhorseStoryNameAll')]#!. [Story.Custom('HorseStorySheHeAll')|U] is a [Story.Custom('HorseStoryMareStallionAll')]."
 DOPPELGANGER: "Your [Glossary( 'Doppelgänger', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "Mirror in the Mud"
 DOPPELGANGER_GLOSS: "A look-alike or double of a living person, often met by chance. In German folklore it's an uncanny apparition and a bad omen — seeing your own double can foreshadow illness or death."
 story_doppelganger_desc: "A peasant bearing your exact likeness has been found — a veritable [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]..."
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "A peasant that looks and talks just like you can be an opportunity... or a curse. For now, [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] resides in your [court|E]."
 story_cycle_hunt_mystical_animal: "Hunting a Mystical Animal"
 story_cycle_hunt_mystical_animal_desc: "During a hunt you glimpsed a mystical, white beast. Capturing it would be like finding the holy grail!"
 WHITE_ANIMAL_INFORMATION_STRING: "You are on the trail of a #V White [Story.MakeScope.Var('animal_type').GetFlagName|U]#!.\n\nCatching it would bring great rewards — but you gain [stress|E] every time the [Story.MakeScope.Var('animal_type').GetFlagName] eludes you. From time to time, a [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] will let you continue the hunt.\n\nWhite [Story.MakeScope.Var('animal_type').GetFlagName] encounters: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (since the first time)#!"
 LEGENDARY_COUNTY_LABEL: "The White [Story.MakeScope.Var('animal_type').GetFlagName|U]'s Current Home"
 story_sycophant: "The Sycophant"
 story_sycophant_desc: "One of your courtiers, an obvious sycophant, is angering your vassals by their mere prescence."
 SYCOPHANT_INFORMATION_STRING: "My [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] and my [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] are at each other's throats. I can pick a favorite, but doing so is sure to anger the other. Time will tell how this situation plays out..."
 SYCOPHANT_LABEL: "The Sycophant"
 JEALOUS_VASSAL_LABEL: "My Most Jealous Vassal"
 story_cycle_pet_rock: "Pet Rock"
 story_cycle_pet_rock_desc: "At your side is a pet rock, its unchanging face a perfect match for your peculiar sense of companionship."
 PET_ROCK_INFORMATION_STRING: "Your rock's name is #V [Story.GetOwner.Custom('RockStoryName')].#!\n[Story.GetOwner.Custom('RockStoryHerHis')|U] craggy exterior is [Story.GetOwner.Custom('RockColor')]."
 story_cycle_admin_eunuch: "Eminent Eunuch"
 story_cycle_admin_eunuch_desc: "A eunuch of particular skill has sought their way into your court. An opportunity, or a threat..?"
 EUNUCH_INFORMATION_STRING: "Over time, you'll have chances to grant [Story.MakeScope.Var('eunuch').Char.GetShortUIName] greater power and influence. Doing so increases the strength of the [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip] [modifier|E].\n\nBut beware — spurn [Story.MakeScope.Var('eunuch').Char.GetHerHim], or give [Story.MakeScope.Var('eunuch').Char.GetHerHim] #EMP too much#! power without securing [Story.MakeScope.Var('eunuch').Char.GetHerHis] loyalty, and the consequences may be dire...\n\nYou have refused [Story.MakeScope.Var('eunuch').Char.GetHerHis] requests [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] times so far."
 EUNUCH_LABEL: "The Eunuch"
 UPSET_COURTIERS: "Subjects that are upset with the Eunuch"
 POETRY_BOOK_LABEL: "My Book of Poetry"
 commission_epic_story: "Commission Epic"
 commission_epic_story_desc: "You are commissioning a great epic to chronicle the feats of your family."
 EPIC_INFORMATION_STRING: "Your [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] is creating an epic [Story.Custom('CompositionTypeAll')] to increase the [dynasty_prestige|E] of the [Story.GetOwner.GetDynasty.GetName] [dynasty|E] and get an [artifact|E].\n\nThe chance of an exceptional [Story.Custom('CompositionTypeAll')] is: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "The Composer of your Epic"
 story_foreign_raised_reformer: "Foreign Raised Reformer"
 story_foreign_raised_reformer_desc: "You were raised far from the land you now call home.\nSo different... and yet, what if home were more like there?"
 REFORMER_INFORMATION_STRING: "You were raised in the [Story.MakeScope.Var('advanced_realm').Title.GetBaseName] by [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], a [Story.MakeScope.Var('advanced_culture').Culture.GetName] [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]. You were impressed by the [Story.MakeScope.Var('advanced_culture').Culture.GetName] [culture|E] and wish to make your own people more like them.\n\nYou will start getting opportunities to either gain Reform or Reaffirmation points:\n$BULLET_WITH_TAB$#indent_newline:7 By pursuing Reformation you can get [innovations|E], [cultural_acceptance|E], [traditions|E], or perhaps even a [GetBuilding('generic_university').GetName]. Keep in mind, Reformation is a long and costly process.#!\n$BULLET_WITH_TAB$#indent_newline:7 By pursuing Reaffirmation you can get [vassal|E] [opinion|E], [dynasty_prestige|E], bonuses to [war|E] in the form of [casus_bellis|E] and [special_troops|E].#!"
 REFORM_LABEL: "Progress towards Reforming your [culture|E]"
 REAFFIRMATION_LABEL: "Progress towards Reaffirming your [culture|E]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Max: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Max: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Max: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Your imaginary friend's name is [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. You will occationally get opportunities to interact with [Story.MakeScope.Var('imaginary_friend_name').Char.GetHerHim]."
 ECCENTRIC_VALUE: "Progress towards gaining [GetTrait('eccentric').GetName( GetNullCharacter )]"
 story_cycle_imaginary_friend: "Imaginary Friend"
 story_cycle_imaginary_friend_desc: "Finally, a friend to play with! Who cares if they're not real? They're real to me!"
 story_greatest_of_khans: "The Greatest of Khans"
 story_greatest_of_khans_desc: "In the Heavens are many great lights. In the Heavens, the sun, moon, and stars. But on earth, there can be only one Khan."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial If your [dynasty|E] loses control of [Story.GetOwner.GetPrimaryTitle.GetName|l], stops being [GetGovernment( 'nomad_government' ).GetName], or has failed to take the #high $mpo_gok_world_conquest_decision$#! [decision|E] by the year #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, these bonuses will be lost and [Story.GetOwner.GetPrimaryTitle.GetName|l] will become liable to shatter!#!"
 