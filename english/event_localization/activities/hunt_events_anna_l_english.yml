l_english:
 hunt_events_anna.0001.t: "Deep Roots"
 hunt_events_anna.0001.desc: "A great oak presents itself with its majestic crown, reaching far and wide — covering everything below in darkness. Looking up towards its branches reminds me of the various dynasties that come and go. All of those who came before me, and those who will pass my legacy forward when I am gone.\n\nAs I get closer, I notice several carved initials on its bark, leaving a gentle reminder that people come and go through the ages. And the person I'd want to pass on my legacy with is my everything, [love_interest.GetFirstName]."
 hunt_events_anna.0001.a: "Carve [love_interest.GetFirstNameNoTooltip] initials into the bark"
 hunt_events_anna.0001.b: "There's no time for such nonsense!"
 hunt_events_anna.0001.b.t_toast: "The hunt is my main priority."
 
 hunt_events_anna.0005.t: "Under My Skin"
 hunt_events_anna.0005.desc: "My small rest is interrupted by a mocking laughter heading towards my direction. I look up, and too little to no surprise am I greeted with a wide grin from [mocking_participant.GetFirstName], while holding what appears to be a deceased [ROOT.Char.Custom('SmallAnimal')] in [mocking_participant.GetHerHis] grip.\n\n"I never took you for someone who'd be able to survive by yourself in the wilderness, so I figured you could use a bit of practice," [mocking_participant.GetSheHe|U] says with a sneering tone, tossing the carcass in front of my feet."
 hunt_events_anna.0005.a: "Attempt to skin the animal."
 hunt_events_anna.0005.a.toast.good: "I successfully skin the animal"
 hunt_events_anna.0005.a.toast.nothing: "Whatever remains are indistinguishable"
 hunt_events_anna.0005.b: "Practice? Don't mind if I do..."
 hunt_events_anna.0005.c: "It isn't up to me to do such a menial task."
 
 hunt_events_anna.0010.t: "Trapped Down Below"
 hunt_events_anna.0010.desc: "With heavy and unstable steps, I track my prey through the [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], focused on keeping up the pace. A sharp snapping sound resonates through my ears. I feel a sudden weightlessness, and a deep flutter finds itself at the pit of my stomach. The fall stops, and a searing pain goes through my body from the impact.\n\nAs I painfully take a look around, all I see are four walls surrounding me. I've fallen down a trap, and I need to find a way to get back up."
 hunt_events_anna.0010.a: "Climb your way out of the hole."
 hunt_events_anna.0010.a.desc.good: "I successfully climb out"
 hunt_events_anna.0010.a.toast.good: "I manage to fight through the pain and get out"
 hunt_events_anna.0010.a.toast.bad: "I stumble once more and get hurt in the process"
 hunt_events_anna.0010.a.desc.bad: "I slip and fall back into the hole"
 hunt_events_anna.0010.b: ""Is there anybody there?!""
 hunt_events_anna.0010.b.flavor: "The hunting party stops with the hunt and helps me instead."
 
 hunt_events_anna.0015.t: "Breathe In... Breathe Out"
 hunt_events_anna.0015.desc: "Strange thuds, low mumblings, and an occasional sigh echo through the glade. A figure holding a bow is pacing back and forth, seemingly frustrated about something.\n\nTo get a closer look, I hide behind a tree and take a subtle peek. I can see my [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName], surrounded by a few arrows scattered around on the ground, barely even reaching the mark [child_with_bow.GetSheHe] has set up. It seems as if [child_with_bow.GetSheHe] could use a bit of guidance."
 hunt_events_anna.0015.a: ""Here, let me show you...""
 hunt_events_anna.0015.a.flavor: "Being a skilled hunter myself, I should be able to use my own expertise to give [child_with_bow.GetHerHim] better posture and precision."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] follows my instructions"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] doesn't understand my instructions"
 hunt_events_anna.0015.b: "Show encouragement by cheering [child_with_bow.GetHerHim] on."
 hunt_events_anna.0015.c: "Let [child_with_bow.GetFirstNameNoTooltip] figure it out."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] finds a way to handle the bow"
 
