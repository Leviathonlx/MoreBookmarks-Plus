l_english:
#Travel Flavor Events
#Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "The [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U] Bridge"
 travel_events.5100.desc: "“My lord! This bridge has an ill reputation. A [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] lives below it!” My [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)] [superstitious_traveler.GetTitledFirstName] cries out. “Surely it shall come upon us, or curse us from afar as we pass.”\n\nMy party members start to whisper amongst themselves. Some invoke the name of [ROOT.Char.GetFaith.HighGodName] for protection. Unfortunately, the bridge is the only safe place to cross for miles."
 travel_events.5100.a: ""I don’t fear any [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] or demon!""
 travel_events.5100.b: ""There are no such thing, [superstitious_traveler.GetTitledFirstNameNoTooltip].""
 travel_events.5100.c: ""We must pray to drive away this spirit.""
 travel_events.5100.d: ""Scary! Let’s find another way around.""
 custom.every_brave_or_impatient_entourage_member: "Every [GetTrait('brave').GetName( GetNullCharacter )] or [GetTrait('impatient').GetName( GetNullCharacter )] entourage member"
 custom.every_cynical_or_impatient_entourage_member: "Every [GetTrait('cynical').GetName( GetNullCharacter )] or [GetTrait('impatient').GetName( GetNullCharacter )] entourage member"
 custom.every_eccentric_or_zealous_entourage_member: "Every [GetTrait('eccentric').GetName( GetNullCharacter )] or [GetTrait('zealous').GetName( GetNullCharacter )] entourage member"
 custom.every_craven_or_impatient_entourage_member: "Every [GetTrait('craven').GetName( GetNullCharacter )] or [GetTrait('impatient').GetName( GetNullCharacter )] entourage member"
