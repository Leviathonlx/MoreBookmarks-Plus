l_english:

 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Lessons of the Heart"
 intrigue_events_bjorn.5100.desc: "Watching my beloved [the_lover.GetFirstName], it occurs to me that there is much that I could learn from such a wonderful person. [the_lover.GetHerHis|U] mind is like a treasure to be plundered; and I got a thing or two to teach [the_lover.GetFirstName] as well.\n\nNot to mention it is such a lovely way to spend our time together!" 
 intrigue_events_bjorn.5100.a: "My love has so much to teach me."
 intrigue_events_bjorn.5100.b: "[the_lover.GetSheHe|U] will be a lovely student."
 intrigue_events_bjorn.5100.c: "Us spending time together is enough for me."
 
 #shared interests
 intrigue_events_bjorn.5101.t: "Shared Pursuits"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] intrigues me so! I want to enjoy what gives [the_lover.GetHerHim] joy.\n\nOh, to spend blissful days together:\n\nHands working in tandem, minds bent towards shared pursuits.\n\nOur hearts beating as one." 
 intrigue_events_bjorn.5101.a: "Show me what inflame your passions, my sweet."
 intrigue_events_bjorn.5101.b: "Come, share this joy with me."
 intrigue_events_bjorn.5101.c: "How about we learn something new together?"
  
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "To Love the Shadow"
 intrigue_events_bjorn.5102.desc: "As we grow closer together, we now stand at a threshold. Perhaps it is time to share everything with one another, truly, so that we may know all there is to know. To share things that are usually… not shared.\n\nThere is no return from beyond this point, but will [the_lover.GetFirstName] accept everything there is to know about me?"
 intrigue_events_bjorn.5102.a: "I got such things to show you." 
 intrigue_events_bjorn.5102.b: "Tell me what you have shared with no one else." 
 intrigue_events_bjorn.5102.c: "Let's explore our darkest fantasies."
 intrigue_events_bjorn.5102.d: "No! Some things should never come to light."
