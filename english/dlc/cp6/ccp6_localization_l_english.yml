l_english:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Saint Peter's Basilica"
 building_holy_site_st_peters_basilica_01_desc: "Built upon the site of Saint Peter's tomb at Vatican Hill at the order of Emperor Constantine I after his conversion to Christianity, the Basilica of Saint Peter serves as the center of Christendom in the West. \n\nThis church traditionally serves as the seat of the Roman Catholic Pope and has grown over the centuries into a sprawling complex, protected by the Leonine Wall."
 
 
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Saint Aubert's Oratory to Saint Michael"
 building_mont_st_michel_01_desc: "In 708, Saint Aubert, Bishop of Avranches, saw in a dream a vision of the Archangel Michael, instructing him to build an oratory upon a nearby tidal island. Aubert at first ignored this vision, attributing it to a trick by the Devil. Eventually the Archangel managed to convince him - according to legend by poking a hole in his skull with a touch, and the bishop ordered the contruction of a new sanctuary on Mont Tombe. \n\nThus begins the history of Mont-Saint-Michel."
 building_mont_st_michel_02: "The Romanesque Abbey of Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "The new church of the abbey is situated atop the highest point of the island, as a testament to the power of God above all in Heaven and Earth, and to mankind's ingenuity. \n\nUnder the abbey, a small town of pilgrims and fishermen is slowly growing."
 building_mont_st_michel_03: "The Merveille"
 building_mont_st_michel_03_desc: "The abbey has been expanded by a series of cloisters, a chaplainry, a wine cellar, the Knights' Room, and many lodgings, forming a Gothic complex that can only be described as a marvel of engineering. \n\nThe abbey has formidable new fortifications, and the settlement beneath it is now a proper town, housing many pilgrims and locals alike."
 building_mont_st_michel_04: "Fortified Monastery of Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "Recent wars have made it clear that even an island of peace like Mont-Saint-Michel can be an essential strategic point of interest. Because of this, the rock has been thoroughly fortified by heavy walls and bastions, and several new lodgings have been created for the garrison. \n\nThe coastal town is a vibrant city now, with almost the entire island covered in houses."
 
 
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Great Stupa of Sanchi"
 building_sanchi_stupa_01_desc: "The Great Stupa was built by the Mauryan Emperor Ashoka in the third century BC, near the site of his wedding with his wife Devi. The grandiose structure housing relics of the Buddha is one of the oldest of its kind, and it is also famed for its intricately carved torana gateways."
 
 
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Boudhanath"
 building_boudhanath_01_desc: "The Boudha Stupa of Kathmandu, also known as Jarung Kashor and Khāsa Chaitya, is one of the largest stupas in Buddhism, and may be the birthplace of what became the Tibetan branch of Buddhism. Its enormous dome and mandala houses the remains of multiple buddhas and innumerable sacred relics of various shapes and forms. \n\nDue to its placement on an ancient trade route between Nepal and Tibet, travellers and merchants frequently stop by to rest and pray."
 
 
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Grand Mosque of Yazd"
 building_yazd_mosque_01_desc: "Built on the site of a fourth century Fire Temple, this illustrious building amazes traveller and pilgrim alike with its great iwans, tiled dome, and its majestic entrance portal with a pair of sky-high minarets."
 
 
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Iron Pillar of Delhi"
 building_qutb_minar_01_desc: "The mighty Iron Pillar of Delhi stands as a symbol to the glory of King Chandragupta II, though subsequent rulers have also etched their names into it. Despite having stood for a long time, there's no trace of rust – a testament to the skill of Indian ironsmiths!"
 building_qutb_minar_02: "Qutb Minar"
 building_qutb_minar_02_desc: "The Quwwat-ul-Islam, a grand mosque surrounding the old site that was the Iron Pillar of Delhi, crowned with a truly enormous minaret called the Qutb Minar. \n\nA magnificient monument to the power of the rulers of Delhi."
 building_qutb_minar_03: "Expanded Quwwat-ul-Islam Mosque"
 building_qutb_minar_03_desc: "The complex around Qutb Minar has been expanded with several more courtyards, gateways, and mausoleums, reaching legendary proportions."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "A second minaret has been added to the complex, designed in the image of the Qutb Minar but twice the size. This colossus towering over Delhi is the pinnacle of Indo-Islamic architecture."
