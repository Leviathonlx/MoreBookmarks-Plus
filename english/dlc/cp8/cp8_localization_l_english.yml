l_english:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Tomb of a Goguryeo King"
 building_goguryeo_tomb_01_desc: "This great rectangular tomb of dressed stone is said to belong to an ancient Goguryeo king, though memory of his name has now been lost. The corridors that lead to the tomb are painted with colorful frescoes, and at the top of the pyramid rises a small wooden pavilion honoring the buried."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Great Buddha of Kamakura"
 building_buddha_kamakura_01_desc: "The #italic Daibutsu#! of Kamakura is a venerable bronze statue of the Amitābha Buddha, weighing several tons and decorated with gilded details. It is enclosed by a great hall inspired by the temples of the southwest and surrounded by thirty-two lotus petals."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Lingapura Pyramid"
 building_pyramid_lingapura_01_desc: "This great stepped pyramid rises from the jungle like a holy mountain, each of its seven terraces holding increasingly ornate shrines and altars. The upper sanctuary crowns the structure, and protects within the sacred #italic lingam#! of Shiva, the center of a complex axial plan of religious design."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Maijishan Grottoes"
 building_maijishan_grottoes_01_desc: "The mountain of Maijishan has long been a place of veneration, and along its southern cliffs, considered geomantically auspicious, hundreds of shrines have been carved into the reddish rock, holding statues and colorful frescoes of serene Buddhas and bodhisattvas. Many have been commissioned by the nearby urban families, for which the site is an occasional place of pilgrimage, and meditative contemplation."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Three Pagodas of Dali"
 building_three_pagodas_dali_01_desc: "From the sprawling temple complex of the city's ruling family stand three tall pagodas of brick walls and stone pedestals. They are the ends of an isosceles triangle, marking the sacred geometry of the site and framing the surrounding mountains and lake."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "Iron Lion of Cangzhou"
 building_iron_lion_cangzhou_01_desc: "The monumental lion is the largest cast-iron sculpture in all of China, and on its strong back supports a bodhisattva gently sat upon a lotus pedestal and richly decorated in gilded details. Set near the flood-prone plain, it has become known as a warden against the rising tides to the local citizens."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Gaocheng Observatory"
 building_dengfeng_observatory_01_desc: "This site has been favored for astronomical observation for centuries, due to its geomantic qualities and symbolic geographic centrality within China. The current structure, a complex trapezoidal shape, serves as a vast sundial, with the tall central ruler casting its shadow into the trench that divides the platform, and marking the passage of the sun."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Candi of Muara Takus"
 building_muara_takus_01_desc: "Many structures compose the temple complex, all brick-built and adorned with sandstone detailings. At the center rise the great stupas of #italic Mahligai#! and #italic Tuo#!, the former tall and slender, the latter vast like a mountain, towering above the smaller shrines and terraces around them."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Stone Pagoda of Mireuksa"
 building_stone_pagoda_01_desc: "A nine-story pagoda that stands upon a broad stone pedestal, its pale masonry glowing under the sunlit sky. It is the first of the stone pagodas of Korea, and its form and balanced proportions have made it a model for temple-builders all across the peninsula."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Thuriang Kilns"
 building_thuriang_kilns_01_desc: "Over two hundred large kilns cover the site, the largest center of celadon production in the region. The ceramics fired here are known for their coarse, hard-fired texture and distinctive yellow-green glaze, and are traded all across the markets of Southeast Asia."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Yuelu Academy"
 building_yuelu_academy_01_desc: "One of the most prestigious academies of learning in China, Yuelu has long served as a center for study and examination. Its layout is centered around a main courtyard, from which corollary halls and pavilions, where generations of scholars have prepared for civil service, extend outward in balanced symmetry."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Slopes of Russet"
 building_chocolate_hills_01_desc: "This geological formation is characterized by a great number of rounded, conical hills that stretch uniformly across the landscape. They are cloaked in a layer of grass that - during the dry season - turns a vivid hue of brown and orange, giving the terrain an unusual autumnal flush."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Fanfang of Guangzhou"
 building_fanfang_guangzhou_01_desc: "The #italic Fanfang#! is an important community of foreign merchants - primarily Muslim Arabs and Persians that have come here through the maritime trade routes - which has been granted its own district to the west of the city, with its own officials and customs. At its center stands a red-walled mosque crowned by a tall minaret and lighthouse, guiding ships and souls to the safety of the harbor."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Wilwatikta Palace"
 building_wilwatikta_palace_01_desc: "A sprawling palatial complex of pavilions, halls, temples and courtyards, the Wilwatikta is vast enough to resemble a city of its own. Rectangular brick walls enclose the grounds, and the entrance to the processional avenue is marked by a series of towering #italic Paduraksa#! gates."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Ha Long Bay"
 building_ha_long_bay_01_desc: "This stunning landscape of karst and limestone islets rises from the calm emerald waters of the gulf, where local fishermen drift searching for catch under the shadow of the pillars."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "My Son Sanctuary"
 building_my_son_sanctuary_01_desc: "The largest and most refined of the Cham temple complexes, the sanctuary is composed of a series of enclosures scattered close to one another in the forested land, each with its own gates, shrines, and stupas. The structures are all built of red-brick, placed in geometrical patterns, and decorated with sandstone lintels."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Gunung Api"
 building_gunung_api_01_desc: "This mountain that raises from the jungle wilderness is sacred to the local people. Amidst the humidity and the mist, its slopes are covered in striking limestone pinnacles and deep caverns carved by the water through countless ages."
 #Sulawesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Sulawesi Megaliths"
 building_suwalesi_megaliths_01_desc: "Scattered across the valleys of Central Sulawesi lie many megalithic figures and icons raised by the local people for rituals and to honor the spirits. These effigies, known as #italic arcas#!, are carved with minimalist precision, their forms traced with subtle and elegant lines."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Kizuki Taisha"
 building_izumo_taisha_01_desc: "This great Shinto shrine - a #italic taisha#! - has been built near the shore, facing the sea. It rises upon a series of enormous wooden pillars and thick trunks, lifting its halls high above the ground where mortals walk, and into the sky where the gods and spirits of the land live."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Temple of Confucius"
 building_confucius_temple_01_desc: "The oldest and most influential of all Confucian temples, this vast complex of halls and courtyards has been a model of reference and inspiration for temple builders all across China and beyond, with its harmonious geometrical layout and refined details. Nearby lies a quiet forest where the tombs of Confucius and his descendants have been laid to rest, forming an important place of pilgrimage for devotees."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Imperial Citadel of Lin'an"
 building_citadel_linan_01_desc: "Built along the northern slopes of the Phoenix Hill, the imperial citadel serves as the seat of the court and its administration, hosting countless scholars and officials in its cavernous halls and corridors. Though not as vast as the palaces of the northern capitals, the refinement and elegance of its terraced gardens and pavilions more than matches them."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Temples of Angkor"
 building_temples_angkor_01_desc: "In the prosperous city of Indra, the gilded roofs and pinnacles of its temples are countless, each more lavishly decorated than the other with sculpted reliefs and statues of deities and devarajas."
 building_temples_angkor_02: "Angkor Wat"
 building_temples_angkor_02_desc: "Angkor Wat is a massive temple complex dedicated to the deity Vishnu. It is designed to be a representation of Mount Meru, home of the gods in Hindu mythology. The complex is surrounded by an impressive moat and has several galleried temples, overflowing with religious art, sculptures and reliefs." 
