l_english:
 tgp_travel_danger_events.0001.t: "Life Among the Ruins"
 tgp_travel_danger_events.0001.intro: "Traveling trough [ROOT.Char.GetCurrentLocation.GetName] I see the impact of the[disaster_situation.GetType.GetNameNoTooltip|l] everywhere."
 tgp_travel_danger_events.0001.flood: "Debris litter the riverside, houses floating down the river like leaves in a stream. A whole village has been consumed by the ranging current."
 tgp_travel_danger_events.0001.earthquake: "The once fertile land and lively village lie silent in disarray and debris, swallowed by the earth itself."
 tgp_travel_danger_events.0001.desc: "\n\nOnce we reach the edges of a ruined town I observe a lonesome child in the rubble. [peasant_character_child.GetSheHe|U] doesn't notice me, as [peasant_character_child.GetSheHe] is desperately trying to rebuild what looks like it was once a farmhouse."
 tgp_travel_danger_events.0001.a: "My men will clear the rubble."
 tgp_travel_danger_events.0001.b: "I will take [peasant_character_child.GetHerHim] under my wing."
 tgp_travel_danger_events.0001.c: "I don't have time for this!"
 impressed_by_kindness: "Impressed by Kindness"