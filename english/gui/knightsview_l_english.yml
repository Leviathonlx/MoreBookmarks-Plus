l_english:

 KNIGHTS_VIEW_FORCE:0 "Force"
 KNIGHTS_VIEW_ALLOW:0 "Allow"
 KNIGHTS_VIEW_FORBID:0 "Forbid"
 KNIGHTS_VIEW_TITLE:1 "$knight_culture_player_plural_no_tooltip$"
 MAX_KNIGHT_COUNT:2 "$knight_culture_player_plural_no_tooltip$: #high [GetKnightCount( GetPlayer.Self )]/[GetKnightLimit( GetPlayer.Self )]#!"
 MAX_KNIGHT_TOOLTIP:1 "#T Maximum Number of $knight_culture_player_plural_no_tooltip$: [knight_i][GetKnightLimit( GetPlayer.Self )|V]#!\n[GetKnightLimitBreakdown( GetPlayer.Self )]"
 KNIGHT_EFFECTIVENESS:1 "$knight_culture_player_no_tooltip$ Effectiveness: #high [GetPlayer.GetKnightEffectiveness|%0]#!"
 KNIGHT_EFFECTIVENESS_TOOLTIP:2 "#T [knight_effectiveness|E]: [GetPlayer.GetKnightEffectiveness|V%0]#!\nBase: #V 100%#!\n[GetPlayer.GetKnightEffectivenessBreakdown]"
 KNIGHTS_VIEW_TITLE_FORBID_TT:2 "#T Forbid [Character.GetShortUIName] from being a $knight_culture_player$#!\n\n[Character.GetShortUIName] may #emphasis never#! join your [armies|E] as a $knight_culture_player_no_tooltip$. This keeps [Character.GetHerHim] safe from dying in [battle|E]."
 CREATE_ACCOLADE_FORBID_TT: "#T Forbid [CreateAccoladeView.GetSelectedKnight.GetShortUIName] from being a $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] may #emphasis never#! join your [armies|E] as a $knight_culture_player_no_tooltip$. This keeps [CreateAccoladeView.GetSelectedKnight.GetHerHim] safe from dying in [battle|E]."
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT:2 "#T Allow [Character.GetShortUIName] to be a $knight_culture_player$#!\n\n[Character.GetShortUIName] may join your [armies|E] as a $knight_culture_player_no_tooltip$ if [Character.GetHerHis] [prowess|E] is one of the highest in the [realm|E]"
 CREATE_ACCOLADE_BY_PROWESS_TT:2 "#T Allow [CreateAccoladeView.GetSelectedKnight.GetShortUIName] to be a $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] may join your [armies|E] as a $knight_culture_player_no_tooltip$ if [CreateAccoladeView.GetSelectedKnight.GetHerHis] [prowess|E] is one of the highest in the [realm|E]"
 KNIGHTS_VIEW_TITLE_FORCE_TT:2 "#T Force [Character.GetShortUIName] to be a $knight_culture_player$#!\n\n[Character.GetShortUIName] #emphasis must#! join your [armies|E] as a $knight_culture_player_no_tooltip$, regardless of [Character.GetHerHis] [prowess|E]. [Character.GetSheHe|U] may take the place of a $knight_culture_player_no_tooltip$ with higher Prowess."
 CREATE_ACCOLADE_FORCE_TT: "#T Force [CreateAccoladeView.GetSelectedKnight.GetShortUIName] to be a $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] #emphasis must#! join your [armies|E] as a $knight_culture_player_no_tooltip$, regardless of [CreateAccoladeView.GetSelectedKnight.GetHerHis] [prowess|E]. [CreateAccoladeView.GetSelectedKnight.GetSheHe|U] may take the place of a $knight_culture_player_no_tooltip$ with higher Prowess."
 KNIGHTS_CURRENT_MAX:0 "[GetKnightCount( GetPlayer.Self )|V]/[GetKnightLimit( GetPlayer.Self )|V]"
 KNIGHTS_SUBHEADER:0 "Eligible [courtiers|E] and [vassals|E]"
 KNIGHTS_SUBHEADER_LANDLESS_ADVENTURER: "Eligible [followers|E]"

 ### Knight permissions
 
 knight_singular: "[GetPlayer.Custom('KnightCultureNoTooltip')]"
 knight_plural: "[GetPlayer.Custom('KnightCulturePluralNoTooltip')]"
 knight_singular_tt: "[GetPlayer.Custom('KnightCulture')]"
 knight_plural_tt: "[GetPlayer.Custom('KnightCulturePlural')]"
 KNIGHT_PERMISSIONS_TITLE: "$knight_singular$ Permissions"
 KNIGHT_PERMISSIONS_SHORT: "Permissions"
 KNIGHT_PERMISSIONS_TT: "Manage who can serve as a $knight_singular_tt$[AddLocalizationIf(Not( KnightsView.GetKnightPermissions.IsDefault), 'KNIGHT_PERMISSIONS_SET')]"
 KNIGHT_PERMISSIONS_SET: "\n#warning Some filters are active!#!"
 YOUR_KNIGHT_PERMISSIONS: "Set your rules for who can be a $knight_singular_tt$.\n[acclaimed|e] or Forced $knight_plural$ are not affected."
 
 MINIMUM_PROWESS: "Minimum Prowess"
 DECREASE_MIN_PROWESS_KP: "Decrease minimum required [prowess|e] for [knights|e]\n#i Right-click to decrease by 10"
 INCREASE_MIN_PROWESS_KP: "Increase minimum required [prowess|e] for [knights|e]\n#i Right-click to increase by 10"
 FAMILY_RELATIONS_KP: "Family and Relations"
 OTHER_CHILDERN_KP: "Other Children"
 WITH_TRAITS_KP: "Traits"
 SPOUSES_OF_CHILDERN_KP: "Spouses of Children"
 COURT_POSITIONS_KP: "Court Positions"
 COURT_POSITIONS_TT: "Disallow non-combat positions.\n[GetCourtPositionType('bodyguard_court_position').GetName] and [GetCourtPositionType('garuda_court_position').GetName] are excluded and always allowed to be [knights|e], since they are meant to help in battles"
 
 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip( Faith.Self )]#!\n[FaithDoctrine.GetEffectsDescription( Faith.Self )]\n\n[FaithDoctrine.GetDescription( Faith.Self )|F]"
 KNIGHT_RESTRICTIONS: "Other restrictions apply"
 
 # this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Knight Restrictions#!\nOnly your direct [vassals|e], [courtiers|e] or [followers|e] can serve as [knights|e].\nYour [culture|e] or [faith|e] determines what genders can act as [knights|e].\n\nA Knight cannot be:\n - Player, [child|e], [prisoner|e] or [GetTrait('incapable').GetName(GetPlayer.Self)]\n - [clergy|e] member (unless [faith|e] or [culture|e] allows it)\n - [master_assassin|e] or [GetTrait('blind').GetName(GetPlayer.Self)] (unless [culture|e] allows it or they are an [GetTrait('order_member').GetName(GetPlayer.Self)])\n - [diarch|e] or [ceremonial_liege|e]\n - [governor|e] of a [duchy|e] (or higher [title|e]) or [house_head|e] of a [noble_family|e]\n\nCultural [traditions|e] and events may lift some restrictions"
 
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Your [culture|e] requires at least 12 [prowess|e]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Your [culture|e] lifts some gender restrictions for defensive [wars|e]"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Your [culture|e] lifts most restrictions for [knights|e] with at least 10 [prowess|e]"
