l_english:

# This changes Japan to use the same house localization as everyone else which is more accurate for the majority of the games timeframe. Technically the Paradox way is more correct for the earliest bookmark when many of the branches would actually still call themselves Fujiwara etc. but even by 1066 clan names were starting to be more often used and as time went on that became the case more and more. In general things should be done based on what fits the majority of the timeframe and this also allows you to properly set up family trees
 # Japanese
 FORMAT_CHARACTER_NAME_JAPANESE: "#high $HOUSE$ $NAME$#!"
 CHARACTER_FIRST_NAME_JAPANESE: "$NAME$"
 CHARACTER_TITLED_FIRST_NAME_JAPANESE: "$TIER$ $NAME$"
 CHARACTER_COUNCIL_POSITION_FIRST_NAME_JAPANESE: "[CHARACTER.GetCouncilTitle] $NAME$"
 CHARACTER_FIRST_NAME_AND_DYNASTY_JAPANESE: "$HOUSE$ $NAME$"
 CHARACTER_NAME_JAPANESE: "$TIER$ $HOUSE$ $NAME$ of $TITLE$"
 CHARACTER_FULL_NAME_JAPANESE: "$TIER$ $HOUSE$ $NAME$ of $TITLE$"
 CHARACTER_FULL_NAME_UNLANDED_JAPANESE: "$HOUSE$ $NAME$"
 CHARACTER_COUNCIL_TITLE_FIRST_NAME_JAPANESE: "$NAME$"
 # Nickname
 CHARACTER_FIRST_NAME_NICKNAMED_JAPANESE: "$NAME$ $NICK$"
 CHARACTER_FIRST_NAME_NICKNAMED_PREFIX_JAPANESE: "$NICK$ $NAME$"
 CHARACTER_TITLED_FIRST_NAME_NICKNAMED_JAPANESE: "$TIER$ $NAME$ $NICK$"
 CHARACTER_TITLED_FIRST_NAME_NICKNAMED_PREFIX_JAPANESE: "$TIER$ $NICK$ $HOUSE$ $NAME$"
 CHARACTER_FIRST_NAME_AND_DYNASTY_NICKNAMED_JAPANESE: "$HOUSE$ $NAME$ '$NICK$'"
 CHARACTER_NAME_NICKNAMED_JAPANESE: "$TIER$ $HOUSE$ $NAME$ '$NICK$' of $TITLE$"
 CHARACTER_NAME_NICKNAMED_PREFIX_JAPANESE: "$TIER$ $NICK$ $HOUSE$ $NAME$ of $TITLE$"
 CHARACTER_FULL_NAME_NICKNAMED_JAPANESE: "$TIER$ $HOUSE$ $NAME$ '$NICK$' of $TITLE$"
 CHARACTER_FULL_NAME_NICKNAMED_PREFIX_JAPANESE: "$TIER$ $NICK$ $HOUSE$ $NAME$ of $TITLE$"
 CHARACTER_FULL_NAME_UNLANDED_NICKNAMED_JAPANESE: "$HOUSE$ $NAME$ '$NICK$'"
 CHARACTER_FULL_NAME_UNLANDED_NICKNAMED_PREFIX_JAPANESE: "$HOUSE$ $NICK$ $NAME$"
 # Patronym
 CHARACTER_FIRST_NAME_PATRONYM_JAPANESE: "$NAME$ $PATRONYM$"
 CHARACTER_TITLED_FIRST_NAME_PATRONYM_JAPANESE: "$TIER$ $NAME$ $PATRONYM$"
 CHARACTER_FIRST_NAME_AND_DYNASTY_PATRONYM_JAPANESE: "$HOUSE$ $NAME$"
 CHARACTER_NAME_PATRONYM_JAPANESE: "$TIER$ $HOUSE$ $NAME$ $PATRONYM$ of $TITLE$"
 CHARACTER_FULL_NAME_PATRONYM_JAPANESE: "$TIER$ $HOUSE$ $NAME$ $PATRONYM$ of $TITLE$"
 CHARACTER_FULL_NAME_UNLANDED_PATRONYM_JAPANESE: "$HOUSE$ $NAME$ $PATRONYM$"
 # Nickname + Patronym 
 CHARACTER_FIRST_NAME_NICKNAMED_PATRONYM_JAPANESE: "$NAME$ $NICK$ $PATRONYM$"
 CHARACTER_FIRST_NAME_NICKNAMED_PREFIX_PATRONYM_JAPANESE: "$NICK$ $NAME$ $PATRONYM$"
 CHARACTER_TITLED_FIRST_NAME_NICKNAMED_PATRONYM_JAPANESE: "$TIER$ $NAME$ $NICK$"
 CHARACTER_TITLED_FIRST_NAME_NICKNAMED_PREFIX_PATRONYM_JAPANESE: "$TIER$ $NICK$ $NAME$ $PATRONYM$"
 CHARACTER_NAME_NICKNAMED_PATRONYM_JAPANESE: "$TIER$ $HOUSE$ $NAME$ '$NICK$' of $TITLE$"
 CHARACTER_NAME_NICKNAMED_PREFIX_PATRONYM_JAPANESE: "$TIER$ $NICK$ $HOUSE$ $NAME$ $PATRONYM$ of $TITLE$"
 CHARACTER_FULL_NAME_NICKNAMED_PATRONYM_JAPANESE: "$TIER$ $HOUSE$ $NAME$ '$NICK$' of $TITLE$"
 CHARACTER_FULL_NAME_NICKNAMED_PREFIX_PATRONYM_JAPANESE: "$TIER$ $NICK$ $HOUSE$ $NAME$ $PATRONYM$ of $TITLE$"
 CHARACTER_FULL_NAME_UNLANDED_NICKNAMED_PATRONYM_JAPANESE: "$HOUSE$ $NAME$ '$NICK$'"
 CHARACTER_FULL_NAME_UNLANDED_NICKNAMED_PREFIX_PATRONYM_JAPANESE: "$NICK$ $HOUSE$ $NAME$ $PATRONYM$"
