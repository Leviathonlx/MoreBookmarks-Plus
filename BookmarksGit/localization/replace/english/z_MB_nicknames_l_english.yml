 nick_bloody_desc:1 "A blunt, horrific identifier for a ruler who has waded through the gore of executions and massacres to secure the throne."
 
 nick_the_oathbreaker:0 "the Oathbreaker"
 nick_the_oathbreaker_desc:0 "Guilty of the highest medieval sin, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] violated sacred vows, rendering [CharYourHerHis(CHARACTER)] honor forever void in the eyes of peers."
 
 nick_little:0 "Little"
 nick_little_desc:1 "A diminutive identifier, often used to distinguish [CHARACTER.GetShortUINameNoTooltipNoFormat|U] from a taller parent or an older sibling of the same name."
 
 nick_the_honest:0 "the Honest"
 nick_the_honest_desc:1 "Maintaining a reputation for keeping [CharYourHerHis(CHARACTER)] word, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is trusted implicitly in diplomatic negotiations."
 
 nick_the_passionate:0 "the Passionate"
 nick_the_passionate_desc:1 "Driven by intense emotion and zealous fervor, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] approaches both love and war with unbridled intensity."
 
 nick_one_eyed:0 "One-eyed"
 nick_one_eyed_desc:0 "Bearing the mark of a brutal battle or unfortunate accident, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s missing eye is a stark testament to [CharYourHerHis(CHARACTER)] survival."
 
 nick_the_trembling:0 "the Trembling"
 nick_the_trembling_desc:1 "Whether afflicted by a nervous palsy or simply renowned for profound cowardice, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] struggles to project strength."
 
 nick_the_rash:0 "the Rash"
 nick_the_rash_desc:1 "Quick to anger and faster to act, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] frequently launches disastrous campaigns without pausing for counsel."
 
 nick_the_elegant:0 "the Elegant"
 nick_the_elegant_desc:0 "Setting the standard for courtly fashion and refined manners, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is the epitome of aristocratic sophistication."
 
 nick_the_eager:0 "the Eager"
 nick_the_eager_desc:1 "Possessing a youthful, sometimes naïve enthusiasm, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] approaches rulership with boundless, restless energy."
 
 nick_the_insane:0 "the Insane"
 nick_the_insane_desc:1 "Lost to the darkness of a fractured mind, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s decrees are erratic, incomprehensible, and frequently dangerous."
 
 nick_the_quick:0 "the Quick"
 nick_the_quick_desc:0 "Possessing lightning-fast reflexes and a razor-sharp wit, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is rarely caught off guard."
 
 nick_the_quick_ironic:0 "$nick_the_quick$"
 nick_the_quick_ironic_desc:1 "A mocking title bestowed upon a ruler notorious for sluggish decision-making and a lethargic physical demeanor."
 
 nick_the_selfish:0 "the Selfish"
 nick_the_selfish_desc:1 "Governing solely for personal enrichment, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ignores the plight of the peasantry and the counsel of the estates."
 
 nick_the_worthy:0 "the Worthy"
 nick_the_worthy_desc:1 "Proving [CharYourHerHimself(CHARACTER)] through exceptional deeds and character, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is universally accepted as deserving of the crown."
 
 nick_the_unworthy:0 "the Unworthy"
 nick_the_unworthy_desc:0 "Failing every test of leadership, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has proven to be a disastrous steward of [CharYourHerHis(CHARACTER)] dynastic inheritance."
 
 nick_the_traitor:0 "the Traitor"
 nick_the_traitor_desc:1 "Having betrayed [CharYourHerHis(CHARACTER)] liege lord in a moment of crisis, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s name is synonymous with perfidy."
 
 nick_the_courageous:0 "the Courageous"
 nick_the_courageous_desc:1 "Never faltering in the face of danger, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] inspires troops by leading charges into the thickest fighting."
 
 nick_the_brilliant:0 "the Brilliant"
 nick_the_brilliant_desc:1 "Endowed with an unparalleled intellect, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] easily outmaneuvers rivals in both diplomacy and military strategy."
 
 nick_the_generous:0 "the Generous"
 nick_the_generous_desc:1 "Famed for open-handed almsgiving and lavishing gifts upon retainers, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ensures loyalty through sheer munificence."
 
 nick_the_diplomat:0 "the Diplomat"
 nick_the_diplomat_desc:1 "A master of statecraft, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] resolves through treaties and marriages what others would fail to achieve with swords."
 
 nick_the_peacemaker:0 "the Peacemaker"
 nick_the_peacemaker_desc:0 "Ending decades of bloodshed, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] successfully mediated long-standing disputes to bring stability to the realm."
 
 nick_the_tactician:0 "the Tactician"
 nick_the_tactician_desc:0 "Possessing a brilliant grasp of terrain and troop movement, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] consistently outwits enemy commanders on the battlefield."
 
 nick_the_overseer:0 "the Overseer"
 nick_the_overseer_desc:1 "Maintaining a strict, unyielding grip on the administration of the realm, nothing escapes [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s bureaucratic gaze."
 
 nick_the_guardian:0 "the Guardian"
 nick_the_guardian_desc:1 "Taking a solemn vow to protect the weak and defend the borders, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] acts as the steadfast shield of the realm."
 
 nick_the_chivalrous:0 "the Chivalrous"
 nick_the_chivalrous_desc:1 "Embodying the highest ideals of knighthood, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is renowned for honor, martial prowess, and courtly grace."
 
 nick_the_valiant:0 "the Valiant"
 nick_the_valiant_desc:0 "Earning glory in the crucible of combat, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is celebrated in song as a fearless and highly capable warrior."
 
 nick_the_deceiver:0 "the Deceiver"
 nick_the_deceiver_desc:0 "Relying on espionage, broken truces, and poisoned cups, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] cannot be trusted in any negotiation."
 
 nick_the_crow:0 "the Crow"
 nick_the_crow_desc:1 "Associated with battlefields and bad omens, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed as a dark, opportunistic scavenger by [CharYourHerHis(CHARACTER)] enemies."
 
 nick_the_trickster:0 "the Trickster"
 nick_the_trickster_desc:1 "Utilizing misdirection and unconventional tactics, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] delights in confounding enemies and bending the rules of engagement."
 
 nick_the_chronicler:0 "the Chronicler"
 nick_the_chronicler_desc:1 "Dedicated to the preservation of history, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] personally oversees the recording of the realm's annals and genealogies."
 
 nick_the_truthseeker:0 "the Truthseeker"
 nick_the_truthseeker_desc:1 "Obsessed with justice and theological purity, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] relentlessly investigates corruption and heresy within the realm."
 
 nick_the_sage:0 "the Sage"
 nick_the_sage_desc:1 "Possessing an aura of ancient wisdom, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is frequently sought out by foreign dignitaries for counsel and mediation."
 
 nick_the_historian:0 "the Historian"
 nick_the_historian_desc:0 "Looking to the past to govern the future, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] relies on the lessons of antiquity to guide state policy."
 
 nick_the_sly:0 "the Sly"
 nick_the_sly_desc:0 "Operating with a quiet, unassuming cunning, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] manipulates court factions without ever drawing suspicion."
 
 nick_the_peaceful:0 "the Peaceful"
 nick_the_peaceful_desc:0 "Refusing to draw the sword except in the most dire defense, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has presided over a rare era of total tranquility."
 
 nick_the_whetstone:0 "the Whetstone"
 nick_the_whetstone_desc:1 "An epithet indicating that [CHARACTER.GetShortUINameNoTooltipNoFormat|U], while perhaps unglamorous, sharpens the skills and blades of those around [CharYouHerHim(CHARACTER)]."
 
 nick_the_slayer_of_the_snake:0 "the Slayer of the Snake"
 nick_the_slayer_of_the_snake_desc:1 "A mythic title tied to the legendary founding of Hausa states, honoring the hero who slew the great serpent to secure the kingdom's future."
 
 nick_the_illuminator:0 "the Illuminator"
 nick_the_illuminator_desc:1 "Revered as the founder of the national church, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] brought the light of the true faith to a previously pagan realm."
 
 nick_the_builder:0 "the Builder"
 nick_the_builder_desc:1 "Leaving a permanent mark on the landscape, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] sponsored the construction of great cities, walls, and lasting monuments."
 
 nick_the_martyrophile:0 "the Martyrophile"
 nick_the_martyrophile_desc:1 "Devoted to the cult of saints, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] spends vast fortunes collecting relics and documenting the sufferings of the faithful."
 
 nick_the_campeador:0 "the Campeador"
 nick_the_campeador_desc:1 "Translating to 'Master of the Battlefield', this illustrious title is reserved for an undefeated champion of unparalleled martial virtue."
 
 nick_the_missionary:0 "the Missionary"
 nick_the_missionary_desc:1 "Traveling far beyond the safety of the realm, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] dedicated [CharYourHerHis(CHARACTER)] life to preaching the gospel to hostile nations."
 
 nick_the_hotspur:0 "the Hotspur"
 nick_the_hotspur_desc:1 "Famed for blinding speed and a reckless eagerness for combat, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is always the first into the fray."
 
 nick_the_vanquisher:0 "the Vanquisher"
 nick_the_vanquisher_desc:1 "Having utterly crushed a massive rebellion or foreign invasion, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] stands as the undisputed master of the realm."
 
 nick_the_bloody:0 "the Bloody"
 nick_the_bloody_desc:1 "A grim identifier for a monarch whose reign is characterized by brutal purges, mass executions, and unending warfare."
 
 nick_the_shy:0 "the Shy"
 nick_the_shy_desc:1 "Avoiding the public eye and the demands of courtly pageantry, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] governs as a virtual recluse."
 
 nick_the_giant:0 "the Giant"
 nick_the_giant_desc:1 "Towering over contemporaries, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s immense physical proportions make [CharYouHerHim(CHARACTER)] a terrifying figure in hand-to-hand combat."
 
 nick_the_little:0 "the Little"
 nick_the_little_desc:1 "A straightforward physical descriptor, often used to differentiate [CHARACTER.GetShortUINameNoTooltipNoFormat|U] from a larger predecessor."
 
 nick_the_one_eyed:0 "the One-eyed"
 nick_the_one_eyed_desc:0 "Bearing the permanent scars of combat, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] lost an eye in service to the realm, adding to a fearsome reputation."
 
 nick_the_oppressor:0 "the Oppressor"
 nick_the_oppressor_desc:1 "Levying crushing taxes and stripping vassals of ancient rights, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is universally reviled by the populace."
 
 nick_the_apostate:0 "the Apostate"
 nick_the_apostate_desc:1 "Committing the ultimate religious betrayal, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] publicly renounced the faith of [CharYourHerHis(CHARACTER)] baptism in favor of another."
 
 nick_the_pagan:0 "the Pagan"
 nick_the_pagan_desc:1 "Stubbornly holding to the old gods in an era of conversion, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed as a dangerous relic by the organized church."
 
 nick_the_heretic:0 "the Heretic"
 nick_the_heretic_desc:1 "Embracing theological doctrines condemned by the religious authorities, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] courts excommunication and holy war."
 
 nick_the_savage:0 "the Savage"
 nick_the_savage_desc:1 "Fighting without honor or restraint, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed by 'civilized' courts as a brutal, bloodthirsty barbarian."
 
 nick_the_defiant:0 "the Defiant"
 nick_the_defiant_desc:1 "Refusing to yield to overwhelmingly superior forces or papal bulls, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] stands alone against the world."
 
 nick_the_sea_king:1 "the Sea-[CHARACTER.Custom('GetQueenKing')|U]"
 nick_the_sea_king_desc:1 "Commanding vast fleets and dominating the maritime trade routes, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] rules the waves as surely as the land."
 
 nick_the_great_and_terrible:0 "the Great and Terrible"
 nick_the_great_and_terrible_desc:1 "A dual-epithet acknowledging that [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s monumental achievements were paid for with horrifying brutality."
 
 nick_the_stonefaced:0 "the Stonefaced"
 nick_the_stonefaced_desc:0 "Never betraying emotion, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] maintains a cold, stoic visage even in the face of absolute triumph or disaster."
 
 nick_the_dry:0 "the Dry"
 nick_the_dry_desc:1 "Lacking the charisma and warmth expected of a monarch, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s court is notoriously devoid of merriment."
 
 nick_the_joyless:0 "the Humorless"
 nick_the_joyless_desc:1 "Approaching the business of state with a grim, uncompromising severity, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] tolerates no frivolity."
 
 nick_the_dull:0 "the Dull"
 nick_the_dull_desc:1 "Uninspiring in speech, uncreative in tactics, and entirely unremarkable in appearance, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is a deeply forgettable ruler."
 
 nick_the_bane_of_danes:0 "the Bane of Danes"
 nick_the_bane_of_danes_desc:1 "Earning legendary status for successfully halting the Viking incursions, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] shattered the aura of Norse invincibility."
 
 nick_the_culture_wall:0 "the [CHARACTER.GetCulture.GetNameNoTooltip] Wall"
 nick_the_culture_wall_desc:1 "Standing as an impenetrable bulwark against foreign invasion, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] single-handedly protected [CharYourHerHis(CHARACTER)] culture from annihilation."
 
 nick_nord_foe:0 "Nord-Foe"
 nick_nord_foe_desc:1 "Dedicating [CharYourHerHis(CHARACTER)] reign to the eradication of northern raiders, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is feared across Scandinavia."
 
 nick_the_scourge_of_the_northerners:0 "the Scourge of the Northerners"
 nick_the_scourge_of_the_northerners_desc:1 "Bringing fire and sword to the homelands of the raiders, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] exacted a terrible, bloody revenge."
 
 nick_gajapati:0 "Gajapati"
 nick_gajapati_desc:1 "Translating to 'Lord of Elephants', this prestigious Indian title denotes [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s immense military power and royal wealth."
 
 nick_the_transcriber:0 "the Transcriber"
 nick_the_transcriber_desc:0 "Dedicating royal resources to the copying and preservation of ancient texts, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] sparked a renaissance of learning."
 
 nick_of_clairvaux:0 "of Clairvaux"
 nick_of_clairvaux_desc:1 "Identified by [CharYourHerHis(CHARACTER)] profound association with the influential Cistercian abbey, shaping the spiritual landscape of the era."
 
 nick_father_of_the_baltic:0 "Father of the Baltic"
 nick_father_of_the_baltic_desc:1 "Through crusade and colonization, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] firmly established the institutions of state and church on the Baltic shores."
 
 nick_mother_of_the_baltic:0 "Mother of the Baltic"
 nick_mother_of_the_baltic_desc:0 "Through crusade and colonization, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] firmly established the institutions of state and church on the Baltic shores."
 
 nick_scourge_of_the_baltic:0 "Scourge of the Baltic"
 nick_scourge_of_the_baltic_desc:1 "Waging a relentless, devastating holy war against the Baltic pagans, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] forced conversion by the sword."
 
 nick_the_mountain_king:0 "the Mountain King"
 nick_the_mountain_king_desc:1 "Ruling from impregnable alpine fortresses, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] exercises absolute control over the high passes and valleys."
 
 nick_beth_nahrain:0 "Sovereign of the Two Rivers"
 nick_beth_nahrain_desc:0 "Claiming the ancient legacy of Mesopotamia, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] rules over the fertile, historic lands between the Tigris and Euphrates."
 
 nick_the_anathema:0 "the Anathema"
 nick_the_anathema_desc:1 "Formally excommunicated and cast out of the communion of the faithful, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is legally and spiritually shunned."
 
 nick_the_angel_of_death:1 "the Angel of [CHARACTER.GetFaith.DeathDeityName|U]"
 nick_the_angel_of_death_desc:1 "Viewed as the ultimate executioner, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] leaves a trail of corpses so vast that [CharYouSheHe(CHARACTER)] is likened to a divine reaper."
 
 nick_monophthalmos:0 "Monophthalmos"
 nick_monophthalmos_desc:1 "Meaning 'The One-Eyed' in Greek, this classical epithet honors the visible sacrifice [CHARACTER.GetShortUINameNoTooltipNoFormat|U] made on the battlefield."
 
 nick_health_god_mercy:0 "[CHARACTER.GetFaith.HealthGodNamePossessive|U] Mercy"
 nick_health_god_mercy_desc:1 "Renowned for funding hospitals and personally tending to the sick, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed as an earthly extension of divine healing."
 
 nick_genghis_khan:0 "Genghis Khan"
 nick_genghis_khan_desc:1 "The 'Universal Ruler'. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has united the steppe and unleashed a storm of conquest that will forever alter the history of the world."
 
 nick_cengiz_khan:0 "Cengiz Khan"
 nick_cengiz_khan_desc:0 "The 'Universal Ruler'. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has united the steppe and unleashed a storm of conquest that will forever alter the history of the world."
 
 nick_yekhe_khagan:0 "Yekhe Khagan"
 nick_yekhe_khagan_desc:0 "The 'Great Khagan'. Claiming absolute supremacy over all nomadic peoples, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] holds the highest authority on the steppe."
 
 nick_dort_yonlug_khagan:0 "Dört Yönlüg Khagan"
 nick_dort_yonlug_khagan_desc:0 "Khagan of the Four Corners. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] claims a divine mandate to rule over all the lands stretching to the edges of the earth."
 
 nick_tengri_khagan:0 "Tengri Khagan"
 nick_tengri_khagan_desc:0 "The Heaven-Born Khagan. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] asserts that [CharYourHerHis(CHARACTER)] vast, unstoppable empire is ordained directly by the Great Blue Sky."
 
 nick_xormuzta:0 "Xormuzta"
 nick_xormuzta_desc:0 "Invoking the ancient Eastern concept of the highest deity, this title elevates [CHARACTER.GetShortUINameNoTooltipNoFormat|U] to a near-mythic status among [CharYourHerHis(CHARACTER)] subjects."
 
 nick_mar_sargis:0 "Mar Sargis"
 nick_mar_sargis_desc:0 "Taking the name of the revered Eastern Christian military saint, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] positions [CharYourHerHimself(CHARACTER)] as a holy warrior of the East."
 
 nick_cihangir:0 "Cihangir"
 nick_cihangir_desc:0 "A Persian title translating to 'Conqueror of the World', reflecting [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s devastatingly successful expansionist campaigns."
 
 nick_culture_khagan:0 "[CHARACTER.GetCulture.GetNameNoTooltip] Khagan"
 nick_culture_khagan_desc:0 "Recognized as the paramount sovereign of [CharYourHerHis(CHARACTER)] people, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has forged a unified tribal empire of staggering power."
 
 nick_akhshunwar:0 "Akhshunwar"
 nick_akhshunwar_desc:0 "Reviving an ancient, prestigious title from the Hephthalite era, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] asserts dominance over the crucial arteries of the Silk Road."
 
 nick_the_wary:0 "the Wary"
 nick_the_wary_desc:1 "Constantly anticipating betrayal, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] maintains heavy guards and relies on a deep network of spies to secure [CharYourHerHis(CHARACTER)] reign."
 
 nick_the_hairy:0 "the Hairy"
 nick_the_hairy_desc:1 "A blunt, descriptive moniker bestowed upon [CHARACTER.GetShortUINameNoTooltipNoFormat|U] due to an exceptionally dense covering of bodily hair."
 
 nick_the_child:0 "the Child"
 nick_the_child_desc:1 "A tragic epithet for a monarch whose reign—and life—ended before they could ever truly come of age and wield power independently."
 
 nick_the_wake:0 "the Wake"
 nick_the_wake_desc:1 "Meaning 'the Watchful', [CHARACTER.GetShortUINameNoTooltipNoFormat|U] earned this legendary title by leading a prolonged, elusive guerrilla resistance against foreign conquerors."
 
 nick_the_bearded:0 "the Bearded"
 nick_the_bearded_desc:1 "In an era of clean-shaven nobles, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] famously maintained a full, traditional beard as a symbol of authority and heritage."
 
 nick_the_mountain_dweller:0 "the Mountain-Dweller"
 nick_the_mountain_dweller_desc:1 "Deeply associated with the rugged highlands, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] utilizes the treacherous alpine terrain to maintain absolute independence."
 
 nick_the_legend_riad:0 "the Legend"
 nick_the_legend_riad_desc:1 "Achieving feats so extraordinary they defy belief, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s life has already transitioned from history into myth."
 
 nick_the_shadow_riad:0 "$nick_the_shadow$"
 nick_the_shadow_riad_desc:0 "$nick_the_legend_riad_desc$"
 
 nick_the_justicar:0 "the Justicar"
 nick_the_justicar_desc:1 "Functioning as the supreme legal authority of the land, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is renowned for enforcing the king's peace with unyielding fairness."
 
 nick_the_green:0 "the Green"
 nick_the_green_desc:2 "A chivalric moniker stemming from [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s fondness for wearing green garments and hosting elaborate, courtly tournaments."
 
 nick_the_foreigner:0 "the Foreigner"
 nick_the_foreigner_desc:1 "Hailing from distant lands, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed with enduring suspicion by the native nobility despite holding the throne."
 
 nick_the_culture:0 "the [CHARACTER.MakeScope.Var('nick_the_culture_var').Culture.GetNameNoTooltip]"
 nick_the_culture_desc:1 "An identifier cementing [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s legacy to the specific cultural traditions and political interests of [CharYourHerHis(CHARACTER)] homeland."
 
 nick_the_linguist:0 "the Linguist"
 nick_the_linguist_desc:1 "A highly educated polyglot, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] conducts complex diplomacy without the need for translators, impressing foreign courts."
 
 nick_the_clumsy:0 "the Clumsy"
 nick_the_clumsy_desc:1 "Lacking any degree of physical grace or martial coordination, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is notoriously inept in the tournament lists."
 
 nick_the_stumbler:0 "the Stumbler"
 nick_the_stumbler_desc:1 "Whether suffering from a physical ailment or general ineptitude, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] struggles to maintain a regal bearing."
 
 nick_the_graceful:0 "the Graceful"
 nick_the_graceful_desc:1 "Moving with an elegant, almost musical poise, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] embodies the highest standards of aristocratic refinement."
 
 nick_the_beautiful:0 "the Beautiful"
 nick_the_beautiful_desc:1 "Possessing striking physical symmetry and charm, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s appearance is the subject of widespread courtly admiration."
 
 nick_the_beautiful_generous:0 "the Beautiful"
 nick_the_beautiful_desc_generous:0 "Though not possessing classical physical beauty, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] earned this title due to the profound beauty of [CharYourHerHis(CHARACTER)] charitable deeds."
 
 nick_the_stutterer:0 "the Stutterer"
 nick_the_stutterer_desc:1 "A severe speech impediment defined [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s public addresses, a vulnerability ruthlessly recorded by contemporary historians."
 
 nick_the_slow:0 "the Slow"
 nick_the_slow_desc:1 "Noted for extreme lethargy in both physical movement and political decision-making, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] consistently fails to seize the initiative."
 
 nick_the_eloquent:0 "the Eloquent"
 nick_the_eloquent_desc:1 "A master of rhetoric, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] can sway hostile councils and inspire broken armies with [CharYourHerHis(CHARACTER)] commanding oratory."
 
 nick_the_bell_keeper:0 "the Bell-Keeper"
 nick_the_bell_keeper_desc:1 "Famed for patronizing foundries and outfitting the churches of the realm with massive, resonant bronze bells."
 
 nick_the_requiem:0 "the Requiem"
 nick_the_requiem_desc:0 "A poetic, somber title denoting a ruler whose reign was defined by tragedy, mourning, and the end of a long dynastic era."
 
 nick_the_Thief_Slayer:0 "the Thief-Slayer"
 nick_the_Thief_Slayer_desc:1 "Restoring order to lawless roads, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ruthlessly hunted down bandit kings and secured the realm's trade routes."
 
 nick_the_cid_campeador:0 "El Cid Campeador"
