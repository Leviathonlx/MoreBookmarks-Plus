 nick_the_petulant_desc:1 "Reacting to political setbacks with childish tantrums and sulking, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] lacks the emotional maturity expected of a sovereign."
 
 nick_the_turbulent:0 "the Turbulent"
 nick_the_turbulent_desc:1 "A polarizing, dramatic figure, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s reign is defined by constant upheaval, shifting alliances, and sweeping reforms."
 
 nick_the_disgraceful:0 "the Disgraceful"
 nick_the_disgraceful_desc:1 "Having committed acts of profound cowardice or moral depravity, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] has brought enduring shame upon [CharYourHerHis(CHARACTER)] dynasty."
 
 nick_the_negotiator:0 "the Negotiator"
 nick_the_negotiator_desc:1 "Possessing a brilliant legal mind, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] excels at brokering complex truces and extracting concessions without shedding blood."
 
 nick_the_executioner:0 "the Executioner"
 nick_the_executioner_desc:1 "Bypassing the courts of justice for the swift swing of the axe, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is infamous for a shockingly high rate of capital punishment."
 
 nick_pennyfather:0 "Pennyfather"
 nick_pennyfather_desc:1 "A derisive term for a sovereign consumed by extreme miserliness, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] hoards coin while the castles of the realm slowly decay."
 
 nick_swan_neck:0 "Swan Neck"
 nick_swan_neck_desc:2 "A poetic identifier noting [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s striking, elegant posture and famously long, graceful neck."
 
 nick_softsword:0 "Softsword"
 nick_softsword_desc:1 "A highly insulting sobriquet implying that [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is both an incompetent military commander and entirely lacking in masculine vigor."
 
 nick_the_chimera:0 "the Chimera"
 nick_the_chimera_desc:1 "A complex, multifaceted ruler, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] displays wildly contradictory traits—mercy and cruelty, piety and sin—baffling historians."
 
 nick_the_abominable:0 "the Abominable"
 nick_the_abominable_desc:1 "Committing acts so heinous they defy contemporary morality, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is viewed with sheer, unadulterated disgust by the civilized world."
 
 nick_bloody_hand:0 "the Bloody-Hand"
 nick_bloody_hand_desc:1 "An epithet indicating that [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is directly, personally responsible for the gruesome murder of rivals and kin."
 
 nick_the_coppersmith:0 "the Coppersmith"
 nick_the_coppersmith_desc:0 "Rising from humble, artisan origins, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] forged an empire, yet [CharYourHerHis(CHARACTER)] working-class roots are never forgotten by the old nobility."
 
 nick_the_eagle_of_arasbaran:0 "the Eagle of Arasbaran"
 nick_the_eagle_of_arasbaran_desc:0 "Watching over the rugged valleys from impregnable fortresses, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is the undisputed, sharp-eyed master of the Arasbaran mountains."
 
 nick_the_fortress_builder:0 "the Fortress-Builder"
 nick_the_fortress_builder_desc:0 "Responding to the constant threat of invasion, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] militarized the landscape with an incredible network of interconnected stone keeps."
 
 nick_the_fire_quencher:0 "the Fire-Quencher"
 nick_the_fire_quencher_desc:0 "A deeply traumatic figure for Zoroastrians, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] earned this title by systematically extinguishing the ancient, sacred flames of the faith."
 
 nick_the_firekeeper:0 "the Fire Keeper"
 nick_the_firekeper_desc:0 "Revered as the ultimate protector of the old ways, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ensured the Sacred Fires continued to burn despite centuries of persecution."
 
 nick_the_fortunate:0 "the Fortunate"
 nick_the_fortunate_desc:0 "Seemingly blessed by divine providence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] inherited vast lands and won crucial battles with an almost eerie degree of luck."
 
 nick_the_ambidextrous:0 "the Ambidextrous"
 nick_the_ambidextrous_desc:0 "Possessing rare physical coordination, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is capable of wielding a sword or pen with equal lethality in either hand."
 
 nick_the_lute_player:0 "the Lute-Player"
 nick_the_lute_player_desc:0 "A patron of courtly music and an accomplished musician in [CharYourHerHis(CHARACTER)] own right, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] brings cultural brilliance to the realm."
 
 nick_the_rekindler_of_iran:0 "the Flame of Persia"
 nick_the_rekindler_of_iran_desc:0 "A monumental, heroic title. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] successfully broke foreign hegemony and restored the ancient glory and independence of the Iranian plateau."
 
 nick_the_righteous_caliph:0 "the Righteous"
 nick_the_righteous_caliph_desc:0 "Ruling in strict accordance with Islamic jurisprudence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is revered as a just, pious, and legitimate successor to the Prophet."
 
 nick_the_conceding:0 "the Conceding"
 nick_the_conceding_desc:0 "Forced to sign humiliating treaties and cede massive royal prerogatives to rebellious vassals, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s reign is one of capitulation."
 
 nick_order_of_the_realm:0 "the Order of the Realm"
 nick_order_of_the_realm_desc:0 "A highly esteemed honorific, recognizing [CHARACTER.GetShortUINameNoTooltipNoFormat|U] as the foundational pillar of bureaucratic stability and civic justice."
 
 nick_the_martyr_king:0 "the Martyr King"
 nick_the_martyr_king_desc:0 "Having fallen in battle against heathens or been executed by usurpers, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is venerated as a holy sacrifice for the nation."
 
 nick_the_younger_missionary:0 "the Younger Missionary"
 nick_the_younger_missionary_desc:0 "Walking in the footsteps of an older, more famous sibling, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] dedicated [CharYourHerHis(CHARACTER)] life to the arduous conversion of the frontiers."
 
 nick_the_caliph_protector:0 "the Protector of the Caliphate"
 nick_the_caliph_protector_desc:0 "Holding the ultimate secular power, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] acts as the militant shield and absolute overlord of the spiritual Caliph."
 
 nick_the_true_culture:0 "the True [CHARACTER.GetCulture.GetNameNoTooltip]"
 nick_the_true_culture_desc:0 "In an era of assimilation and foreign influence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] stands as an uncompromising bastion of traditional [CHARACTER.GetCulture.GetName] customs."
 
 nick_the_reformer:0 "the Reformer"
 nick_the_reformer_desc:0 "Overhauling antiquated laws and corrupt institutions, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] dragged the realm into a new, enlightened era."
 
 nick_royalsbane:0 "Royalsbane"
 nick_royalsbane_desc:0 "A terrifying reputation on the battlefield; [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is known specifically for targeting, striking down, and slaying rival monarchs."
 
 nick_the_city_builder:0 "the City Builder"
 nick_the_city_builder_desc:0 "Expanding the urban footprint of the realm, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] charted new towns, granted civic charters, and fostered a booming merchant class."
 
 nick_the_castle_builder:0 "the Castle Builder"
 nick_the_castle_builder_desc:0 "Recognizing the necessity of defense, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] heavily fortified the borders with an impressive array of concentric stone castles."
 
 nick_the_temple_builder:0 "the Temple Builder"
 nick_the_temple_builder_desc:0 "Demonstrating immense piety through architecture, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] sponsored the construction of magnificent cathedrals and holy sites."
 
 nick_the_dragonslayer:0 "the Dragonslayer"
 nick_the_dragonslayer_desc:0 "Entering the realm of myth, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is credited by folklore with the slaying of a great beast, establishing [CharYourHerHimself(CHARACTER)] as a legendary hero."
 
 nick_natures_bane:0 "Nature's Bane"
 nick_natures_bane_desc:0 "Clearing vast, ancient forests and draining treacherous swamps, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] relentlessly subdues the wilderness to expand civilization."
 
 nick_the_stout:0 "the Stout"
 nick_the_stout_desc:0 "A physical identifier noting [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s broad, thick-set frame, suggesting an unyielding and robust physical constitution."
 
 nick_chief_of_the_zanj:0 "Sahib az-Zanj"
 nick_chief_of_the_zanj_desc:0 "Leading one of the most massive slave revolts in history, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] became the undisputed sovereign and liberator of the Zanj laborers."
 
 nick_albaghid:0 "Albaghid"
 nick_albaghid_desc:0 "Meaning 'The Abominable', this title was bestowed by imperial authorities upon [CHARACTER.GetShortUINameNoTooltipNoFormat|U] for leading relentless, disruptive, and highly destructive uprisings."
 
 nick_phrangopoulos:0 "Phrangopoulos"
 nick_phrangopoulos_desc:0 "Meaning 'Son of the Franks', this Greek identifier highlights [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s distinct Western origins while serving within the Byzantine sphere."
 
 nick_the_liberal:0 "the Liberal"
 nick_the_liberal_desc:0 "Renowned for open-handed munificence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] lavishes alms on the poor and grants extensive liberties to the burghers of the realm."
 
 nick_the_lazy:0 "the Lazy"
 nick_the_lazy_desc:0 "Abdicating the responsibilities of rulership in favor of idle leisure, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s apathy has allowed the realm to stagnate."
 
 nick_the_tall:0 "the Tall"
 nick_the_tall_desc:0 "Standing head and shoulders above [CharYourHerHis(CHARACTER)] contemporaries, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s impressive vertical stature is a defining and intimidating physical trait."
 
 nick_the_clever:0 "the Clever"
 nick_the_clever_desc:0 "Relying on sharp intellect, diplomatic trickery, and strategic foresight, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] easily outwits more physically imposing rivals."

 nick_the_stylite:0 "the Stylite"
 nick_the_stylite_desc:1 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] is revered by the faithful for undertaking the extreme ascetic practice of living atop a pillar, demonstrating profound spiritual endurance."
 
 nick_the_grazer:0 "the Grazer"
 nick_the_grazer_desc:1 "Adopting the severe asceticism of the 'boskoi', [CHARACTER.GetShortUINameNoTooltipNoFormat|U] abandoned civilization to live in the wilderness, subsisting only on what the earth naturally provides."
 
 nick_the_iron_wearer:0 "the Iron-Wearer"
 nick_the_iron_wearer_desc:1 "A testament to extreme penitence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] physically mortified [CharYourHerHis(CHARACTER)] flesh by wearing heavy iron chains, a highly visible sign of worldly renunciation."

 nick_old_man_of_the_mountain:0 "the Old Man of the Mountain"
 nick_old_man_of_the_mountain_desc:1 "A title of dread and reverence, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] rules as the enigmatic master of a secretive Nizari order, projecting lethal influence from impregnable mountain fortresses."

 nick_barbarossa:0 "Barbarossa"
 nick_barbarossa_desc:1 "Known to the Italians as 'Barbarossa', [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s striking red beard became the indelible symbol of [CharYourHerHis(CHARACTER)] imperial authority and martial campaigns."

 nick_danishmend:0 "Danişmend"
 nick_danishmend_desc:1 "Originating from the Persian term for 'scholar' or 'wise man', this title honors [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s renowned wisdom, religious learning, and foundational role in the realm."

 nick_protosebastos:0 "Protosebastos"
 nick_protosebastos_desc:1 "An exalted Byzantine court dignity translating to 'First Venerable One', elevating [CHARACTER.GetShortUINameNoTooltipNoFormat|U] to the highest echelons of imperial proximity and prestige."

 nick_protosebaste:0 "Protosebaste"
 nick_protosebaste_desc:1 "An exalted Byzantine court dignity translating to 'First Venerable One', elevating [CHARACTER.GetShortUINameNoTooltipNoFormat|U] to the highest echelons of imperial proximity and prestige."

 nick_iscariot:0 "Iscariot"
 nick_iscariot_desc:1 "A damning epithet drawn from biblical betrayal. Contemporaries brand [CHARACTER.GetShortUINameNoTooltipNoFormat|U] as a traitor who sold out [CharYourHerHis(CHARACTER)] liege, kin, or faith for personal gain."

 nick_the_corpulent:0 "the Corpulent"
 nick_the_corpulent_desc:1 "Noted in contemporary chronicles for immense physical girth, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s corpulence became a defining, and heavily recorded, characteristic of [CharYourHerHis(CHARACTER)] reign."

 nick_the_drunkard_michael_iii:0 "the Drunkard"
 nick_the_drunkard_michael_iii_desc:1 "A highly partisan epithet popularized by rival dynasties, aimed at delegitimizing [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s reign by portraying [CharYouHerHim(CHARACTER)] as hopelessly addicted to the cup."
 
 nick_the_pious_michael_iii:0 "the Pious"
 nick_the_pious_michael_iii_desc:1 "Remembered favorably by orthodox chroniclers, this title vindicates [CHARACTER.GetShortUINameNoTooltipNoFormat|U] for [CharYourHerHis(CHARACTER)] pivotal role in restoring the veneration of icons and championing the true faith."
 
 nick_the_young_michael_iii:0 "the Young"
 nick_the_young_michael_iii_desc:1 "Crowned in infancy and meeting an early, violent end, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is remembered by this title as a tragic figure who spent a lifetime in the shadow of regents."
 
 nick_the_exile:0 "the Exile"
 nick_the_exile_desc:1 "Driven from [CharYourHerHis(CHARACTER)] ancestral lands by political upheaval, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s historical identity is inextricably linked to [CharYourHerHis(CHARACTER)] time spent in foreign banishment."
 
 nick_lackland_young:0 "Lackland"
 nick_lackland_young_desc:1 "A mocking moniker applied in youth, as [CHARACTER.GetShortUINameNoTooltipNoFormat|U] was left without a substantial territorial inheritance compared to the vast appanages of [CharYourHerHis(CHARACTER)] elder siblings."
 
 nick_lackland_ironic:0 "$nick_lackland_young$"
 nick_lackland_ironic_desc:1 "Initially a cruel jest regarding [CharYourHerHis(CHARACTER)] lack of inheritance, the title is now used ironically by chroniclers to highlight [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s eventual acquisition of a vast domain."
 
 nick_lackland_old:0 "$nick_lackland_young$"
 nick_lackland_old_desc:1 "A tragically prophetic title. Though once commanding a great empire, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] lost vast swathes of ancestral territory, ending [CharYourHerHis(CHARACTER)] reign truly 'lacking land'."
 
 nick_curtmantle:0 "Curtmantle"
 nick_curtmantle_desc:1 "Noted for rejecting long, flowing courtly robes in favor of practical, shorter riding cloaks, [CHARACTER.GetShortUINameNoTooltipNoFormat|U]'s sartorial choice reflects a famously restless and energetic nature."

 nick_pauper_king:0 "the Pauper King"
 nick_pauper_king_desc:1 "Despite holding the highest office, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is remembered for adopting the humble habits, dress, and company of the common folk, earning the bemusement of the nobility."

 nick_the_mapmaker:0 "the Mapmaker"
 nick_the_mapmaker_desc:1 "Famed for patronizing cartographers and undertaking extensive geographical surveys, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] expanded the realm's understanding of the known world."

 nick_the_ploughman:0 "the Ploughman"
 nick_the_ploughman_desc:1 "Rooted in foundational dynasty myths, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] is celebrated as a leader called directly from the fields, symbolizing a sacred bond between the ruler and the earth."
 
